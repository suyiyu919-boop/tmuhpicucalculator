<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ICU Drug Calculator v1.00</title>
<style>
  :root {
    --bg: #f6f7fb;
    --card: #ffffff;
    --border: #d8dbe7;
    --text: #1f2430;
    --muted: #6b7280;
    --blue: #1565c0;
    --warn: #b26a00;
    --danger: #c62828;
    --info: #6c757d;
    --highlight: #fff3cd;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    background: var(--bg); color: var(--text);
  }
  .page {
    max-width: 1400px; margin: 0 auto; padding: 12px;
  }
  .header {
    display: flex; gap: 12px; justify-content: space-between; align-items: flex-start;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px; margin-bottom: 12px;
  }
  .header-meta { font-size: 13px; color: var(--muted); line-height: 1.5; white-space: pre-line; }
  button {
    border: 1px solid var(--border); background: #fff; border-radius: 10px;
    padding: 10px 14px; cursor: pointer; font: inherit;
  }
  button.primary { background: #1f6feb; color: white; border-color: #1f6feb; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .layout {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  @media (max-width: 980px) {
    .layout { grid-template-columns: 1fr; }
    .header { flex-direction: column; }
  }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px;
  }
  .card h2, .card h3 { margin: 0 0 10px 0; font-size: 18px; }
  .field {
    display: grid; gap: 6px; margin-bottom: 10px;
  }
  .field-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  @media (max-width: 720px) { .field-row { grid-template-columns: 1fr; } }
  label { font-size: 14px; }
  input, select, textarea {
    width: 100%; border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; font: inherit; background: white;
  }
  .toolbar { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .result {
    border: 1px solid var(--border); border-radius: 10px; background: #fff;
    padding: 12px; min-height: 280px; white-space: pre-wrap; line-height: 1.55;
    font-size: 16px;
  }
  .line { display: block; }
  .boldnum { font-weight: 700; }
  .drug-header { color: var(--blue); font-weight: 700; }
  .highlight { background: var(--highlight); padding: 1px 2px; border-radius: 4px; }
  .info { color: var(--info); }
  .warning { color: var(--warn); font-weight: 700; }
  .danger { color: var(--danger); font-weight: 700; }
  .small { font-size: 13px; color: var(--muted); }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="header-meta">ICU Drug Calculator v1.00 ｜ Last update: 2026-04-21
Developed by Yi-Yu Su, MD, PhD ｜ Taipei Medical University Hospital
※本工具僅供臨床輔助，請手動驗算並依實際情況判斷</div>
    <button id="clearAllBtn">清空全部</button>
  </div>

  <div class="layout">
    <div class="card">
      <h2>主要藥物計算（選藥與劑量）</h2>
      <div class="field">
        <label for="weight">體重 (kg)</label>
        <input id="weight" inputmode="decimal" placeholder="例如 12.5" />
      </div>
      <div class="field">
        <label for="mode">選擇模式</label>
        <select id="mode"></select>
      </div>
      <div id="dynamicFields"></div>
      <div class="toolbar" style="justify-content:flex-start;">
        <button class="primary" id="calcMainBtn">計算主要結果</button>
      </div>

      <div class="toolbar">
        <button id="copyMainBtn">複製結果</button>
      </div>
      <div class="result" id="mainResult"></div>
    </div>

    <div class="card">
      <h2>持續輸注計算（流速／濃度）</h2>
      <div class="field">
        <label for="infusionDrug">選擇藥物</label>
        <select id="infusionDrug"></select>
      </div>

      <div class="card" style="padding:10px; margin-bottom:10px;">
        <h3>標準濃度算流速</h3>
        <div class="field">
          <label id="targetDoseLabel" for="infusionTarget">目標輸注劑量</label>
          <input id="infusionTarget" inputmode="decimal" />
        </div>
        <button class="primary" id="calcFlowBtn">計算流速</button>
      </div>

      <div class="card" style="padding:10px; margin-bottom:10px;">
        <h3>指定流速算濃度</h3>
        <div class="field-row">
          <div class="field">
            <label id="customDoseLabel" for="customDose">目標劑量</label>
            <input id="customDose" inputmode="decimal" value="1" />
          </div>
          <div class="field">
            <label for="customFlow">目標流速（mL/hr）</label>
            <input id="customFlow" inputmode="decimal" value="1" />
          </div>
        </div>
        <button class="primary" id="calcConcBtn">計算濃度</button>
      </div>

      <div class="toolbar">
        <button id="copyClinicalBtn">複製臨床備註</button>
        <button id="copyInfusionBtn">複製結果</button>
      </div>
      <div class="result" id="infusionResult"></div>
      <div class="small" id="copyStatus"></div>
    </div>
  </div>
</div>

function msgError(text="輸入值無效") { return `ⓘ輸入：${text}`; }

function cleanNumericText(text) {
  return String(text ?? "").trim().replace(/，|．|。|,/g, ".").replace(/\s+/g, "");
}
function parseFloatSafe(text) {
  const x = parseFloat(cleanNumericText(text));
  return Number.isFinite(x) ? x : null;
}
function convertConcentrationValue(value, fromUnit, toUnit) {
  if (fromUnit === toUnit) return value;
  if (fromUnit === "mg/mL" && toUnit === "mcg/mL") return value * 1000;
  if (fromUnit === "mcg/mL" && toUnit === "mg/mL") return value / 1000;
  return null;
}
function formatConcentrationWithConversion(value, fromUnit, toUnit, decimalsFrom=4, decimalsTo=1) {
  let text = `${value.toFixed(decimalsFrom)} ${fromUnit}`;
  const converted = convertConcentrationValue(value, fromUnit, toUnit);
  if (converted !== null && fromUnit !== toUnit) {
    text += `（= ${converted.toFixed(decimalsTo)} ${toUnit}）`;
  }
  return text;
}

  if (standardUnit !== recommendedUnit && Math.abs(approxStandard) < 0.05) {
    const converted = convertConcentrationValue(value, standardUnit, recommendedUnit);
    if (converted !== null) {
      const approxConverted = Math.round(converted * 10) / 10;
      const approxText = Math.abs(approxConverted - Math.round(approxConverted)) < 1e-9
        ? `${Math.round(approxConverted)}`
        : approxConverted.toFixed(1);
      return `${base}（約 ${approxText} ${recommendedUnit}）`;
    }

  return `${base}（約 ${approxStandard.toFixed(1)} ${standardUnit}）`;
}
function formatConcentrationRange(data) {
  const low = data.recommended_concentration_low;
  const high = data.recommended_concentration_high;
  const unit = data.recommended_concentration_unit || data.standard_concentration_unit || "";
  if (low == null && high == null) return null;
  if (low != null && high != null) {
    if (Math.abs(low - high) < 1e-12) return `${fmtGeneral(low)} ${unit}`;
    return `${fmtGeneral(low)} - ${fmtGeneral(high)} ${unit}`;
  }
  if (high != null) return `≤ ${fmtGeneral(high)} ${unit}`;
  return `≥ ${fmtGeneral(low)} ${unit}`;
}
function getUnitNotice(data) {
  const unit = data.infusion_calc_unit || "";
  if (unit === "mg/kg/hr" || unit === "mcg/kg/hr") return msgInfo(`本藥物慣用單位為 ${unit}`);
  return null;
}
function formatWithApprox(value, unit) {
  const rounded = Math.round(value * 10) / 10;
  return `${value.toFixed(2)} ${unit}（約 ${rounded.toFixed(1)} ${unit}）`;
}
function getFlowPracticalWarning(flow) {
  if (flow < MIN_PRACTICAL_FLOW_ML_HR) return msgWarning(`流速低於可實際輸注範圍（<${MIN_PRACTICAL_FLOW_ML_HR} mL/hr），請調整濃度或劑量`);
  return null;
}
function getRateWarning(data, targetRate) {
  const high = data.infusion_high_per_kg;
  const absoluteMax = data.absolute_max_infusion;
  const unit = data.infusion_calc_unit || "";
  if (absoluteMax != null && targetRate > absoluteMax) return msgDanger(`高於臨床警示門檻（>${fmtGeneral(absoluteMax)} ${unit}）`);
  if (high != null && targetRate > high) return msgWarning(`超過建議範圍（>${fmtGeneral(high)} ${unit}）`);
  return null;
}
function getConcentrationWarning(data, concentration) {
  const low = data.recommended_concentration_low;
  const high = data.recommended_concentration_high;
  const recommendedUnit = data.recommended_concentration_unit || data.standard_concentration_unit || "";
  const actualUnit = data.standard_concentration_unit || "";
  const converted = convertConcentrationValue(concentration, actualUnit, recommendedUnit);
  if (converted === null) return msgError("濃度單位無法換算");
  if (high != null && converted > high) return msgDanger(`濃度高於建議上限（>${fmtGeneral(high)} ${recommendedUnit}）`);
  if (low != null && converted < low) return msgWarning(`濃度低於常用範圍（<${fmtGeneral(low)} ${recommendedUnit}）`);
  return null;
}
function hasInfusion(drugName) {
  return !!(drug_data[drugName] && drug_data[drugName].infusion_calc_unit);

function fmtGeneral(v) {

}
function markDirty() {

function convertTargetToMlPerHr(weight, targetRate, calcUnit, concentrationValue, concentrationUnit) {
  if (calcUnit === "mg/kg/hr") {
    const total = targetRate * weight;
    return concentrationUnit === "mg/mL" ? total / concentrationValue : null;
  }
  if (calcUnit === "mcg/kg/hr") {
    const total = targetRate * weight;
    if (concentrationUnit === "mcg/mL") return total / concentrationValue;
    if (concentrationUnit === "mg/mL") return (total / 1000) / concentrationValue;
  }
  if (calcUnit === "mcg/kg/min") {
    const total = targetRate * weight * 60;
    if (concentrationUnit === "mcg/mL") return total / concentrationValue;
    if (concentrationUnit === "mg/mL") return (total / 1000) / concentrationValue;
  }
  return null;
}
function concentrationNeededForTarget(weight, targetRate, targetFlow, calcUnit, outputUnit) {
  if (targetFlow <= 0) return null;
  if (calcUnit === "mg/kg/hr") {
    const total = targetRate * weight;
    return outputUnit === "mg/mL" ? total / targetFlow : null;
  }
  if (calcUnit === "mcg/kg/hr") {
    const total = targetRate * weight;
    if (outputUnit === "mcg/mL") return total / targetFlow;
    if (outputUnit === "mg/mL") return (total / targetFlow) / 1000;
  }
  if (calcUnit === "mcg/kg/min") {
    const total = targetRate * weight * 60;
    if (outputUnit === "mcg/mL") return total / targetFlow;
    if (outputUnit === "mg/mL") return (total / targetFlow) / 1000;
  }
  return null;
}

function buildClinicalNote(drug, concentration, weight, flow, targetRate) {
  const data = drug_data[drug];
  let concUnit = data.recommended_concentration_unit || data.standard_concentration_unit;
  let concValue = convertConcentrationValue(concentration, data.standard_concentration_unit, concUnit);
  if (concValue === null) {
    concValue = concentration;
    concUnit = data.standard_concentration_unit;
  }
  const roundedConcValue = Math.round(concValue * 10) / 10;
  const roundedFlow = Math.round(flow * 10) / 10;
  const concText = Math.abs(roundedConcValue - Math.round(roundedConcValue)) < 1e-9 ? `${Math.round(roundedConcValue)} ${concUnit}` : `${roundedConcValue.toFixed(1)} ${concUnit}`;
  let roundedConcStandard = convertConcentrationValue(roundedConcValue, concUnit, data.standard_concentration_unit);
  if (roundedConcStandard === null) roundedConcStandard = concentration;
  let actualRate;
  const calcUnit = data.infusion_calc_unit;
  if (calcUnit === "mg/kg/hr") {
    actualRate = (roundedFlow * roundedConcStandard) / weight;
  } else if (calcUnit === "mcg/kg/hr") {
    const totalPerHr = data.standard_concentration_unit === "mg/mL" ? roundedFlow * roundedConcStandard * 1000 : roundedFlow * roundedConcStandard;
    actualRate = totalPerHr / weight;
  } else if (calcUnit === "mcg/kg/min") {
    const totalPerHr = data.standard_concentration_unit === "mg/mL" ? roundedFlow * roundedConcStandard * 1000 : roundedFlow * roundedConcStandard;
    actualRate = totalPerHr / weight / 60;
  } else {
    actualRate = targetRate;
  }
  let diluentText = (data.diluent_recommendation || "").replace("可使用 ", "").replace(" 稀釋", "");
  if (!diluentText) diluentText = "D5W/NS";
  const flowText = Math.abs(roundedFlow - Math.round(roundedFlow)) < 1e-9 ? `${Math.round(roundedFlow)}` : `${roundedFlow.toFixed(1).replace(/0$/, "").replace(/\.$/, "")}`;
  return `${drug} ${concText} in ${diluentText}, run ${flowText} mL/hr = ${actualRate.toFixed(2)} ${data.infusion_calc_unit}`;
}

function renderResult(targetId, text) {
  const target = el(targetId);
  const lines = String(text || "").split("\n");
  target.innerHTML = lines.map(line => {
    const esc = line
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
    let cls = "line";
    if (/^===\s+[A-Za-z]/.test(line)) cls += " drug-header";
    if (line.startsWith("❗")) cls += " danger";
    else if (line.startsWith("⚠️")) cls += " warning";
    else if (line.startsWith("ⓘ") || line.startsWith("ℹ️")) cls += " info";
    if (line.includes("換算劑量：") || line.includes("建議流速：") || line.includes("所需濃度：")) cls += " highlight";
    const withBoldNums = esc.replace(/(\d+\.\d+|\d+)/g, '<span class="boldnum">$1</span>');
    return `<span class="${cls}">${withBoldNums || "&nbsp;"}</span>`;
  }).join("");
}

function createSelectField(key, labelText, values, defaultValue) {
  const wrap = document.createElement("div");
  wrap.className = "field";
  const label = document.createElement("label");
  label.textContent = labelText;
  const select = document.createElement("select");
  select.dataset.key = key;
  values.forEach(v => {
    const opt = document.createElement("option");
    opt.value = v; opt.textContent = v; select.appendChild(opt);
  });
  select.value = defaultValue;
  select.addEventListener("change", () => {
    fieldValues[key] = select.value;
    updateInfusionDrugOptions();
    markDirty();
  });
  fieldValues[key] = defaultValue;
  wrap.appendChild(label);
  wrap.appendChild(select);
  return wrap;
}

function getCurrentModeSelectedInfusionDrugs() {
  const mode = el("mode").value;
  const selected = [];
  function add(name) {
    if (name && name !== "無" && hasInfusion(name) && !selected.includes(name)) selected.push(name);
  }
  if (mode === MODE_SINGLE) add(fieldValues.drug);
  else if (mode === MODE_PAINFUL) ["primary1", "primary2", "analgesia"].forEach(k => add(fieldValues[k]));
  else if (mode === MODE_IMAGE || mode === MODE_PROTON) ["sedation1", "sedation2"].forEach(k => add(fieldValues[k]));
  else if (mode === MODE_MV) ["sedation", "analgesia", "paralysis"].forEach(k => add(fieldValues[k]));
  else if (mode === MODE_PRESSOR) add(fieldValues.pressor);
  return selected;
}

  if (a !== "無") lines.push("", "[止痛藥]", formatStandardDrug(a, weight));
  if (p !== "無") lines.push("", "[肌肉鬆弛藥]", formatStandardDrug(p, weight));
  return lines.join("\n");
}

function calculateMain() {
  const mode = el("mode").value;
  if (mode === MODE_EDUCATION) {
    renderResult("mainResult", educationText());
    updateInfusionDrugOptions();
    return;
  }
  const weight = parseFloatSafe(el("weight").value);
  if (weight == null) return renderResult("mainResult", msgError("體重輸入值無效"));
  if (weight <= 0) return renderResult("mainResult", msgError("體重需大於 0"));
  let result = "請選擇模式";
  if (mode === MODE_SINGLE) result = calculateSingleDrug(weight);
  else if (mode === MODE_RSI) result = calculateRsi(weight);
  else if (mode === MODE_PAINFUL) result = calculatePainful(weight);
  else if (mode === MODE_IMAGE || mode === MODE_PROTON) result = calculateImage(weight);
  else if (mode === MODE_MV) result = calculateMv(weight);
  else if (mode === MODE_PRESSOR) result = calculatePressor(weight);
  renderResult("mainResult", result);
  updateInfusionDrugOptions();
  markClean();
}

function calculateInfusionRate() {
  const weight = parseFloatSafe(el("weight").value);
  const target = parseFloatSafe(el("infusionTarget").value);
  const drug = el("infusionDrug").value;
  if (weight == null || target == null || !drug) { lastClinicalNote = ""; renderResult("infusionResult", msgError("請確認體重、藥物與目標輸注劑量")); return; }
  if (weight <= 0) { lastClinicalNote = ""; renderResult("infusionResult", msgError("體重需大於 0")); return; }
  if (target <= 0) { lastClinicalNote = ""; renderResult("infusionResult", msgError("目標輸注劑量需大於 0")); return; }
  const data = drug_data[drug];
  const ml = convertTargetToMlPerHr(weight, target, data.infusion_calc_unit, data.standard_concentration_value, data.standard_concentration_unit);
  if (ml == null) { lastClinicalNote = ""; renderResult("infusionResult", msgError("無法換算流速")); return; }
  const flowWarning = getFlowPracticalWarning(ml);
  if (flowWarning) { lastClinicalNote = ""; renderResult("infusionResult", flowWarning); markClean(); return; }
  const notices = [getUnitNotice(data), getRateWarning(data, target)].filter(Boolean);
  const lines = [];
  if (notices.length) { lines.push(...notices, ""); }
  lines.push("=== 標準濃度算流速 ===");
  lines.push(`藥物：${drug}`);
  lines.push(`體重：${weight.toFixed(2)} kg`);
  lines.push(`目標劑量：${target} ${data.infusion_calc_unit}`);
  lines.push(`標準濃度：${data.standard_concentration_value} ${data.standard_concentration_unit}`);
  lines.push(`建議流速：${formatWithApprox(ml, "mL/hr")}`);
  if (data.diluent_recommendation) lines.push(`建議稀釋液：${data.diluent_recommendation}`);
  const cr = formatConcentrationRange(data);
  if (cr) lines.push(`常用濃度範圍：${cr}`);
  lastClinicalNote = buildClinicalNote(drug, data.standard_concentration_value, weight, ml, target);
  lines.push("", "※請手動驗算以避免計算錯誤", "※請於醫囑備註標示藥物劑量與最終濃度", "", `臨床備註格式：${lastClinicalNote}`);
  renderResult("infusionResult", lines.join("\n"));
  markClean();
}

function calculateCustomConcentration() {
  const weight = parseFloatSafe(el("weight").value);
  const target = parseFloatSafe(el("customDose").value);
  const flow = parseFloatSafe(el("customFlow").value);
  const drug = el("infusionDrug").value;
  if (weight == null || target == null || flow == null || !drug) { lastClinicalNote = ""; renderResult("infusionResult", msgError("請確認體重、藥物、目標劑量與目標流速")); return; }
  if (weight <= 0) { lastClinicalNote = ""; renderResult("infusionResult", msgError("體重需大於 0")); return; }
  if (target <= 0) { lastClinicalNote = ""; renderResult("infusionResult", msgError("目標劑量需大於 0")); return; }
  if (flow <= 0) { lastClinicalNote = ""; renderResult("infusionResult", msgError("目標流速需大於 0")); return; }
  const data = drug_data[drug];
  const conc = concentrationNeededForTarget(weight, target, flow, data.infusion_calc_unit, data.standard_concentration_unit);
  if (conc == null) { lastClinicalNote = ""; renderResult("infusionResult", msgError("無法換算所需濃度")); return; }
  const warnings = [getUnitNotice(data), getRateWarning(data, target), getConcentrationWarning(data, conc)].filter(Boolean);
  const lines = [];
  if (warnings.length) lines.push(...warnings, "");
  lines.push("=== 客製濃度計算 ===");
  lines.push(`藥物：${drug}`);
  lines.push(`體重：${weight.toFixed(2)} kg`);
  lines.push(`目標劑量：${target} ${data.infusion_calc_unit}`);
  lines.push(`所需濃度：${formatConcentrationResultText(conc, data.standard_concentration_unit, data.recommended_concentration_unit || data.standard_concentration_unit)}`);
  lines.push(`目標流速：${flow.toFixed(2)} mL/hr`);
  if (data.diluent_recommendation) lines.push(`建議稀釋液：${data.diluent_recommendation}`);
  const cr = formatConcentrationRange(data);
  if (cr) lines.push(`常用濃度範圍：${cr}`);
  lines.push("", "※請手動驗算以避免計算錯誤", "※請於醫囑備註標示藥物劑量與最終濃度");
  lastClinicalNote = buildClinicalNote(drug, conc, weight, flow, target);
  lines.push("", `臨床備註格式：${lastClinicalNote}`);
  renderResult("infusionResult", lines.join("\n"));
  markClean();
}

async function copyText(text, okText) {
  if (resultsDirty) { setStatus("請先重算"); return; }
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    setStatus(okText || "已複製");
  } catch (e) {
    setStatus("複製失敗");
  }
}
function setStatus(text) {
  const s = el("copyStatus");
  s.textContent = text;
  setTimeout(() => { if (s.textContent === text) s.textContent = ""; }, 1500);
}

function clearAll() {
  el("weight").value = "";
  el("infusionTarget").value = "";
  el("customDose").value = "1";
  el("customFlow").value = "1";
  el("mode").value = MODE_SINGLE;
  rebuildDynamicFields();
  el("infusionDrug").innerHTML = "";
  updateInfusionUnitLabel();
  lastClinicalNote = "";
  renderResult("mainResult", "");
  renderResult("infusionResult", "");
  markClean();
  el("weight").focus();
}

function init() {
  const mode = el("mode");
  ALL_MODES.forEach(m => {
    const opt = document.createElement("option");
    opt.value = m; opt.textContent = m; mode.appendChild(opt);
  });
  mode.value = MODE_SINGLE;
  mode.addEventListener("change", () => {
    rebuildDynamicFields();
    lastClinicalNote = "";
    renderResult("mainResult", "");
    renderResult("infusionResult", "");
    markClean();
  });
  ["weight","infusionTarget","customDose","customFlow"].forEach(id => el(id).addEventListener("input", markDirty));
  el("infusionDrug").addEventListener("change", () => { updateInfusionUnitLabel(); markDirty(); });
  el("calcMainBtn").addEventListener("click", calculateMain);
  el("calcFlowBtn").addEventListener("click", calculateInfusionRate);
  el("calcConcBtn").addEventListener("click", calculateCustomConcentration);
  el("copyMainBtn").addEventListener("click", () => copyText(el("mainResult").innerText.trim(), "已複製"));
  el("copyInfusionBtn").addEventListener("click", () => copyText(el("infusionResult").innerText.trim(), "已複製"));
  el("copyClinicalBtn").addEventListener("click", () => copyText(lastClinicalNote, "已複製"));
  el("clearAllBtn").addEventListener("click", clearAll);
  rebuildDynamicFields();
  updateInfusionUnitLabel();
  renderResult("mainResult", "");
  renderResult("infusionResult", "");
}
document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
